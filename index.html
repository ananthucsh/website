<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #ff6a00, #ee0979);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    text-align: center;
}

.container {
    padding: 30px;
    max-width: 500px;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 15px;
}

p {
    font-size: 1.1rem;
    margin-bottom: 25px;
    line-height: 1.6;
}

.icon {
    font-size: 60px;
    margin-bottom: 20px;
    animation: bounce 1.5s infinite;
}

/* Button */
.btn {
    display: inline-block;
    padding: 12px 25px;
    border-radius: 30px;
    background: #fff;
    color: #ee0979;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.btn:hover {
    background: #000;
    color: #fff;
}

/* Animation */
@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Responsive */
@media(max-width: 500px){
    h1 {
        font-size: 2rem;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="icon">🚧</div>

    <h1>Under Construction</h1>

    <p>
        Our Website is Under Construction.  
        We’re working to launch soon. Stay tuned!
    </p>

    <a href="tel:+911234567890" class="btn">Contact Us</a>
</div>

</body>
</html>
