<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #ffffff;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            animation: slideDown 1.5s ease;
        }

        p {
            font-size: 1.2em;
            color: #666;
            animation: fadeIn 2.5s ease;
        }

        .buttons {
            margin-top: 30px;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 28px;
            font-size: 1em;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
            animation: fadeIn 3.5s ease;
        }

        .call-btn {
            background: #007BFF;
        }

        .call-btn:hover {
            background: #0056b3;
            transform: scale(1.05);
        }

        .whatsapp-btn {
            background: #25D366;
        }

        .whatsapp-btn:hover {
            background: #1ebe5d;
            transform: scale(1.05);
        }

        /* Floating circles animation */
        .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.2;
            animation: float 10s infinite ease-in-out;
        }

        .circle:nth-child(1) {
            width: 200px;
            height: 200px;
            background: #007BFF;
            top: 10%;
            left: 15%;
        }

        .circle:nth-child(2) {
            width: 150px;
            height: 150px;
            background: #00C9A7;
            bottom: 15%;
            right: 10%;
        }

        .circle:nth-child(3) {
            width: 100px;
            height: 100px;
            background: #FFC107;
            top: 70%;
            left: 30%;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from { transform: translateY(-40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <!-- Animated background -->
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="container">
        <h1>🚧 Website Under Construction</h1>
        <p>We’re working hard to launch something amazing. Stay tuned!</p>

        <div class="buttons">
            <a href="tel:+919744572639" class="btn call-btn">📞 Call Me</a>

            <a href="https://wa.me/919744572639?text=Hi%20I%20am%20interested" 
               class="btn whatsapp-btn" target="_blank">
               💬 WhatsApp
            </a>
        </div>
    </div>

</body>
</html>
