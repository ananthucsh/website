<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff4b2b, #ff416c);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 500px;
}

h1 {
    font-size: 120px;
    margin: 0;
}

h2 {
    margin: 10px 0;
    font-weight: 500;
}

p {
    font-size: 16px;
    opacity: 0.9;
}

a {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #fff;
    color: #ff416c;
    text-decoration: none;
    border-radius: 25px;
    font-weight: bold;
    transition: 0.3s;
}

a:hover {
    background: #f1f1f1;
}

.icon {
    font-size: 60px;
    margin-bottom: 15px;
}
</style>

</head>
<body>

<div class="container">
    <div class="icon">⚠️</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Oops! The page you are looking for doesn't exist or has been moved.</p>

    <a href="https://asdesign.in/">Go Back Home</a>
</div>

</body>
</html>
